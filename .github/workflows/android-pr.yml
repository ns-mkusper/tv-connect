name: Android PR checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-lint-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build, lint, and run JVM tests
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug :app:lintDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tv-connect-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Run mock target benchmark tests
        run: ./gradlew :app:testDebugUnitTest --tests "com.example.tlctvscreenshot.MockTargetBenchmarkTest" -Dtvconnect.benchmarks=true --stacktrace

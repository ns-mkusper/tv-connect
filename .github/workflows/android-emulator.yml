name: Android emulator UI tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-emulator.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-emulator.yml'

jobs:
  emulator-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build, lint, and run JVM tests
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug :app:lintDebug --stacktrace

      - name: Run Compose UI tests and capture screenshot
        id: emulator_ui_tests
        timeout-minutes: 18
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-boot-timeout: 480
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            set -eux
            mkdir -p captures
            adb wait-for-device
            adb devices -l
            ./gradlew :app:connectedDebugAndroidTest --stacktrace
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.example.tlctvscreenshot/.MainActivity
            sleep 5
            adb exec-out screencap -p > captures/compose-workbench-emulator.png

      - name: Ensure screenshot artifact exists
        if: always()
        run: |
          mkdir -p captures
          if ! ls captures/*.png >/dev/null 2>&1; then
            base64 -d > captures/emulator-unavailable.png <<'PNG'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAFgwJ/lwQnWQAAAABJRU5ErkJggg==
          PNG
          fi

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-screenshots
          path: captures/*.png
          if-no-files-found: error

      - name: Upload instrumentation test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: connected-ui-test-results
          path: app/build/outputs/androidTest-results/connected/**
          if-no-files-found: ignore

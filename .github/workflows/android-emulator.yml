name: Android emulator screenshots

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-emulator.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-emulator.yml'

jobs:
  emulator-screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Launch emulator and capture screenshot
        id: emulator_screenshot
        continue-on-error: true
        timeout-minutes: 12
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-boot-timeout: 480
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            set -euxo pipefail
            adb devices -l
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -n com.example.tlctvscreenshot/.MainActivity
            sleep 5
            mkdir -p captures
            adb exec-out screencap -p > captures/compose-workbench-emulator.png
            adb shell pm list packages | grep -i magi || true

      - name: Ensure screenshot artifact exists
        if: always()
        run: |
          mkdir -p captures
          if ! ls captures/*.png >/dev/null 2>&1; then
            base64 -d > captures/emulator-unavailable.png <<'PNG'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAFgwJ/lwQnWQAAAABJRU5ErkJggg==
          PNG
          fi

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emulator-screenshots
          path: captures/*.png
          if-no-files-found: error
